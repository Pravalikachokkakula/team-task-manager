{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow mb-4">
            <div class="card-header py-3 bg-white">
                <h6 class="m-0 font-weight-bold text-primary">{{ 'Edit Task' if task else 'Assign New Task' }}</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('tasks.edit_task', task_id=task.id) if task else url_for('tasks.create_task') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Task Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ task.title if task else '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="project_id" class="form-label">Project</label>
                        <select class="form-select" id="project_id" name="project_id" required>
                            <option value="">Select a Project...</option>
                            {% for project in projects %}
                            <option value="{{ project.id }}" {% if task and task.project_id == project.id %}selected{% endif %}>{{ project.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="user_id" class="form-label">Assignee</label>
                        <select class="form-select" id="user_id" name="user_id">
                            <option value="">Unassigned</option>
                            {% for user in users %}
                            <option value="{{ user.id }}" {% if task and task.user_id == user.id %}selected{% endif %}>{{ user.username }} ({{ user.role }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="due_date" class="form-label">Due Date</label>
                        <input type="date" class="form-control" id="due_date" name="due_date" value="{{ task.due_date.strftime('%Y-%m-%d') if task and task.due_date else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ task.description if task and task.description else '' }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> {{ 'Save Changes' if task else 'Create Task' }}</button>
                    <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
